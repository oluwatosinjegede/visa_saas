version: "3.9"

services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: visa_saas
      POSTGRES_USER: visa_saas
      POSTGRES_PASSWORD: visa_saas
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
